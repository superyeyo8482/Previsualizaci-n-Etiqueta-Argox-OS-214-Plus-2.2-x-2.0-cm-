<!DOCTYPE html>
<html>
<head>
    <title>Previsualización Etiqueta Argox</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f0f0f0; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .label-preview {
            background: white;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 220px;   /* 2.2 cm en pantalla (asumiendo 100px/cm aprox) */
            height: 200px;  /* 2.0 cm */
            position: relative;
            margin-bottom: 20px;
        }
        .element {
            position: absolute;
            white-space: nowrap;
        }
        .controls {
            background: white;
            padding: 15px;
            border-radius: 8px;
            width: 300px;
        }
        input, button { margin: 5px; padding: 5px; width: 90%; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background: #45a049; }
        .coord { font-size: 12px; color: gray; }
    </style>
</head>
<body>
<h2>Previsualización Etiqueta Argox OS-214 Plus (2.2 x 2.0 cm)</h2>
<p>Coordenadas PPLA (X,Y) en puntos. Arrastra los elementos para ajustar visualmente.</p>

<div class="container">
    <div class="label-preview" id="labelCanvas" style="width: 220px; height: 200px; background: white; border: 1px solid black;">
        <!-- Los elementos se agregarán aquí dinámicamente -->
    </div>
    <div class="controls">
        <h3>Ajustar Coordenadas</h3>
        <div>
            <label>Logo AC (X,Y):</label>
            <input type="text" id="logoXY" value="20,15">
            <button onclick="updateElement('logo')">Actualizar</button>
        </div>
        <div>
            <label>Material y peso (X,Y):</label>
            <input type="text" id="materialXY" value="70,15">
            <button onclick="updateElement('material')">Actualizar</button>
        </div>
        <div>
            <label>Precio (X,Y):</label>
            <input type="text" id="precioXY" value="20,65">
            <button onclick="updateElement('precio')">Actualizar</button>
        </div>
        <div>
            <label>Código de barras (X,Y):</label>
            <input type="text" id="barcodeXY" value="20,120">
            <button onclick="updateElement('barcode')">Actualizar</button>
        </div>
        <div>
            <label>ID texto (X,Y):</label>
            <input type="text" id="idXY" value="20,180">
            <button onclick="updateElement('id')">Actualizar</button>
        </div>
        <button onclick="resetToDefault()">Restablecer valores por defecto</button>
        <button onclick="generatePPLA()">Mostrar comando PPLA</button>
        <pre id="pplaOutput" style="background:#eee; padding:5px; font-size:12px; overflow-x:auto;"></pre>
    </div>
</div>

<script>
    // Función para crear elementos en el canvas
    function createElement(id, text, x, y, fontSize = 12, fontWeight = 'normal') {
        let el = document.getElementById(id);
        if (!el) {
            el = document.createElement('div');
            el.id = id;
            el.className = 'element';
            document.getElementById('labelCanvas').appendChild(el);
        }
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.fontSize = fontSize + 'px';
        el.style.fontWeight = fontWeight;
        el.innerText = text;
        // Añadir info de coordenadas
        el.setAttribute('title', `X=${x}, Y=${y}`);
        return el;
    }

    // Datos de ejemplo (puedes cambiarlos por los reales)
    let datos = {
        material: 'Plata',
        peso: '8gr',
        id: 'CA001',
        precio: '$1,100.00'
    };

    function updateAll() {
        // Leer coordenadas de los inputs
        let logo = document.getElementById('logoXY').value.split(',').map(Number);
        let material = document.getElementById('materialXY').value.split(',').map(Number);
        let precio = document.getElementById('precioXY').value.split(',').map(Number);
        let barcode = document.getElementById('barcodeXY').value.split(',').map(Number);
        let id = document.getElementById('idXY').value.split(',').map(Number);

        createElement('logoElem', 'AC', logo[0], logo[1], 20, 'bold');
        createElement('materialElem', `${datos.material} ${datos.peso}`, material[0], material[1], 14);
        createElement('precioElem', datos.precio, precio[0], precio[1], 28, 'bold');
        createElement('barcodeElem', '▮▮▮▮▮▮▮▮▮▮', barcode[0], barcode[1], 16); // simulación de código de barras
        createElement('idElem', `ID: ${datos.id}`, id[0], id[1], 12);
    }

    function updateElement(type) {
        updateAll();
    }

    function resetToDefault() {
        document.getElementById('logoXY').value = '20,15';
        document.getElementById('materialXY').value = '70,15';
        document.getElementById('precioXY').value = '20,65';
        document.getElementById('barcodeXY').value = '20,120';
        document.getElementById('idXY').value = '20,180';
        updateAll();
    }

    function generatePPLA() {
        // Generar comando PPLA según las coordenadas actuales
        let logo = document.getElementById('logoXY').value.split(',').map(Number);
        let material = document.getElementById('materialXY').value.split(',').map(Number);
        let precio = document.getElementById('precioXY').value.split(',').map(Number);
        let barcode = document.getElementById('barcodeXY').value.split(',').map(Number);
        let id = document.getElementById('idXY').value.split(',').map(Number);

        let ppla = "\x02L\nD11\n";
        ppla += `H15,10\n`;  // origen global
        ppla += `PC${logo[0]},${logo[1]},0,1,3,5,AC\n`;
        ppla += `PC${material[0]},${material[1]},0,1,2,4,${datos.material} ${datos.peso}\n`;
        ppla += `PC${precio[0]},${precio[1]},0,1,7,8,${datos.precio}\n`;
        ppla += `B${barcode[0]},${barcode[1]},0,1,2,3,50,${datos.id}\n`;
        ppla += `PC${id[0]},${id[1]},0,1,2,4,ID: ${datos.id}\n`;
        ppla += "E\n";
        document.getElementById('pplaOutput').innerText = ppla;
    }

    // Inicializar
    window.onload = () => {
        updateAll();
    };
</script>
</body>
</html>
